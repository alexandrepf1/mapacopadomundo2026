<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root { --bg:#0f172a; --panel:#111827; --muted:#94a3b8; --text:#e5e7eb; --accent:#38bdf8; --card:#1f2937; --line:#334155; }
* { box-sizing:border-box; }
body { margin:0; font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); }
.app { display:grid; grid-template-rows:25vh 75vh; height:100vh; }
.sidebar { overflow:hidden; border-bottom:1px solid var(--line); background:linear-gradient(180deg,#0b1220,#111827); padding:6px 8px; }
h1 { font-size:13px; margin:0; white-space:nowrap; line-height:1.1; }
.titlebar { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:0 0 4px; }
#languageSelect { width:auto; min-width:58px; height:20px; padding:1px 4px; border-radius:6px; font-size:10px; flex:0 0 auto; }
.controls { display:grid; grid-template-columns:1fr 1fr; gap:4px 8px; align-items:stretch; }
.filter-col { display:grid; grid-template-columns:1fr; grid-auto-rows:24px; gap:4px; align-content:start; }
.filter-row { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
.right-filters { gap:4px; }
input, select, button { width:100%; height:24px; min-height:24px; padding:2px 6px; border-radius:7px; border:1px solid var(--line); background:#0b1220; color:var(--text); font-size:11px; line-height:1.1; }
.filter-col > input, .filter-col > select, .filter-col > button, .filter-col > .button-link, .filter-col > .select-with-icon { height:24px; min-height:24px; }
.select-with-icon select { height:24px; min-height:24px; }
button { display:inline-flex; align-items:center; justify-content:center; gap:4px; }

.btn-icon { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex:none; opacity:.95; }
.select-with-icon { position:relative; width:100%; }
.select-with-icon select { padding-left:24px; }
.select-icon { position:absolute; left:8px; top:50%; transform:translateY(-50%); width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; color:#cbd5e1; pointer-events:none; z-index:2; opacity:.9; }
button { cursor:pointer; background:#13233a; } button:hover { border-color:var(--accent); } .button-link { display:flex; align-items:center; justify-content:center; gap:4px; width:100%; height:24px; padding:2px 6px; border-radius:7px; border:1px solid var(--line); background:#13233a; color:var(--text); font-size:11px; line-height:1.1; text-decoration:none; white-space:nowrap; } .button-link:hover { border-color:var(--accent); }
#todayTomorrow.range-active { background:#1d4ed8; border-color:#60a5fa; color:#eff6ff; box-shadow:0 0 0 1px rgba(96,165,250,.35) inset; }
.map-card.tomorrow { background:rgba(214,220,230,.88); border:1px dashed rgba(156,163,175,.85); }
.cluster-bubble.tomorrow { background:#d6dce6; color:#0f172a; border:1px dashed rgba(156,163,175,.85); }
.map-card.live { background:rgba(187,247,208,.9); border-color:rgba(22,101,52,.35); }

.stats { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:4px; margin:5px 0 4px; min-height:28px; height:28px; overflow:visible; }
.stat { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:3px 4px; min-width:0; line-height:1; display:flex; align-items:center; justify-content:center; gap:3px; overflow:visible; }
.stat-icon { width:12px; height:12px; stroke:var(--accent); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex:0 0 12px; opacity:.95; }
.stat-icon.total-icon { stroke:#ffffff; }
.stat b { font-size:11px; margin-right:1px; line-height:1; } .stat span { color:var(--muted); font-size:8px; line-height:1; white-space:nowrap; }
#list { display:flex; gap:5px; overflow-x:auto; padding-bottom:2px; max-height:38px; }
.match { min-width:180px; background:rgba(31,41,55,.92); border:1px solid var(--line); border-radius:8px; padding:4px 6px; cursor:pointer; transition:.15s; }
.match:hover, .match.active { border-color:var(--accent); transform:translateY(-1px); }
.match .top { display:flex; justify-content:space-between; gap:6px; color:var(--muted); font-size:9px; margin-bottom:1px; }
.match .teams { font-weight:700; font-size:10px; line-height:1.1; }
.match .venue { color:var(--muted); font-size:9px; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#map { height:75vh; width:100%; }
.badge { display:inline-block; padding:1px 7px; border-radius:999px; background:#0b1220; border:1px solid var(--line); color:#cbd5e1; }
.leaflet-div-icon { background:transparent; border:0; }
.venue-marker { position:relative; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; pointer-events:auto; }
.venue-marker .leader-line { width:2px; height:18px; background:rgba(15,23,42,.75); box-shadow:0 0 0 1px rgba(255,255,255,.7); }
.venue-marker .anchor-dot { width:7px; height:7px; border-radius:50%; background:#0f172a; border:2px solid white; box-shadow:0 1px 4px rgba(0,0,0,.45); }
.map-card { position:relative; background:rgba(255,255,255,.85); color:#111827; border:1px solid rgba(15,23,42,.22); border-radius:10px; padding:4px 8px; box-shadow:0 3px 12px rgba(0,0,0,.25); font-size:10px; line-height:1.15; font-weight:700; text-align:center; white-space:nowrap; overflow:hidden; cursor:pointer; }
.map-card.live { background:rgba(187,247,208,.9); border-color:rgba(22,101,52,.35); }
.map-card.live.tomorrow, .map-card.tomorrow.live { background:rgba(187,247,208,.9); border:1px solid rgba(22,101,52,.35); }
.map-card .live-tag { color:#166534; font-size:10px; font-weight:900; margin-left:3px; }
.map-card .score-row { color:#0f172a; font-size:13px; font-weight:900; white-space:nowrap; overflow:visible; text-overflow:clip; }
.map-card .live-row { color:#065f46; font-size:10px; font-weight:900; letter-spacing:.03em; line-height:1.05; }
.flag-icon { display:inline-block; width:18px; height:12px; min-width:18px; max-width:18px; object-fit:cover; vertical-align:-0.08em; border-radius:1px; box-shadow:0 0 0 1px rgba(15,23,42,.18); }
.flag-fallback { display:inline-flex; width:18px; height:12px; min-width:18px; max-width:18px; align-items:center; justify-content:center; padding:0; border-radius:2px; background:#e5e7eb; color:#0f172a; font-size:6px; line-height:1; font-weight:900; vertical-align:.03em; box-shadow:0 0 0 1px rgba(15,23,42,.18); overflow:hidden; }
.map-card .time-row, .map-card .date-row, .map-card .venue-row { color:#1f2937; font-size:9px; font-weight:700; overflow:hidden; text-overflow:ellipsis; }
.cluster-bubble { width:34px; height:34px; border-radius:10px; background:#38bdf8; color:#082f49; display:flex; align-items:center; justify-content:center; font-weight:900; border:3px solid white; box-shadow:0 4px 16px rgba(0,0,0,.35); cursor:pointer; }
.popup h3 { margin:0 0 6px; color:#111827; } .popup p { margin:4px 0; color:#111827; } .popup .mini { font-size:12px; color:#374151; }
.leaflet-popup-content { min-width:260px; max-width:min(340px, calc(100vw - 72px)); }
.match-detail-popup { min-width:260px; max-width:340px; color:#111827; }
.match-detail-popup .detail-title { margin:0 0 8px; font-size:14px; font-weight:900; line-height:1.2; color:#111827; }
.match-detail-popup .detail-score-row { display:grid; grid-template-columns:minmax(0,1fr) auto minmax(0,1fr); align-items:center; gap:8px; margin:0 0 8px; }
.match-detail-popup .detail-side { display:flex; align-items:center; gap:5px; min-width:0; font-weight:900; }
.match-detail-popup .detail-side.away { justify-content:flex-end; text-align:right; }
.match-detail-popup .team-name { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.match-detail-popup .team-code { font-size:12px; font-weight:900; letter-spacing:.03em; min-width:34px; text-align:center; }
.match-detail-popup .detail-result { display:inline-block; padding:4px 9px; border-radius:999px; background:#eef2ff; color:#0f172a; font-size:13px; font-weight:900; white-space:nowrap; }
.match-detail-popup .detail-row { margin:4px 0; color:#111827; line-height:1.25; }
.match-detail-popup .detail-meta { color:#374151; font-size:12px; line-height:1.25; }
@media (max-width: 520px) { .leaflet-popup-content { min-width:230px; max-width:calc(100vw - 64px); } .match-detail-popup { min-width:230px; } .match-detail-popup .detail-score-row { gap:6px; } .match-detail-popup .detail-result { font-size:12px; padding:3px 7px; } } .popup .match-popup-row { white-space:nowrap; } .leaflet-popup-content { width:auto!important; }
@media (min-width: 901px) { .app { grid-template-columns:320px 1fr; grid-template-rows:100vh; } .sidebar { height:100vh; border-bottom:0; border-right:1px solid var(--line); overflow:hidden; } #map { height:100vh; } .controls { grid-template-columns:1fr 1fr; gap:4px 6px; } .filter-col { grid-auto-rows:24px; gap:4px; } #list { display:none; } .stats { margin-top:6px; height:30px; min-height:30px; } }
@media (max-height: 820px) { #list { display:none; } .stats { margin-top:3px; } }
@media (max-width: 900px) { .app { grid-template-rows:36vh 64vh; } #map { height:64vh; } .controls { grid-template-columns:1fr 1fr; } #list { display:none; } }
</style>
</head>

  'Ghana':'gh', 'Haiti':'ht', 'Iran':'ir', 'Iraq':'iq', 'Ivory Coast':'ci', 'Japan':'jp', 'Jordan':'jo',
  'Mexico':'mx', 'Morocco':'ma', 'Netherlands':'nl', 'New Zealand':'nz', 'Norway':'no', 'Panama':'pa',
  'Paraguay':'py', 'Portugal':'pt', 'Qatar':'qa', 'Saudi Arabia':'sa', 'Scotland':'gb-sct', 'Senegal':'sn',
  'South Africa':'za', 'South Korea':'kr', 'Spain':'es', 'Sweden':'se', 'Switzerland':'ch', 'Tunisia':'tn',
  'Türkiye':'tr', 'Turkey':'tr', 'Uruguay':'uy', 'USA':'us', 'United States':'us', 'Uzbekistan':'uz'
};
function flag(team) {
  const code = codeForTeam(team);
  const imgCode = flagImageCodes[team];
  if (!imgCode) return `<span class="flag-fallback" title="${team}">${code}</span>`;
  return `<img class="flag-icon" src="https://flagcdn.com/w20/${imgCode}.png" srcset="https://flagcdn.com/w40/${imgCode}.png 2x" alt="${team} flag" title="${team}" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'flag-fallback',textContent:'${code}',title:'${team}'}))">`;
}
function displayDateDMY(isoDate) {
  if (!isoDate || !/^\d{4}-\d{2}-\d{2}$/.test(isoDate)) return isoDate || '';
  return `${isoDate.slice(8,10)}-${isoDate.slice(5,7)}-${isoDate.slice(0,4)}`;
}
function matchHasScore(m) { return Number.isInteger(m.score1) && Number.isInteger(m.score2); }
function matchTimeState(m) {
  const d = sourceDateTime(m);
  const state = String(m.statusState || '').toLowerCase();
  const status = String(m.liveStatus || '').toLowerCase();
  if (state === 'in' || /live|half|^[0-9]+['’]|\b(1st|2nd)\b/.test(status)) return 'live';
  if (state === 'pre') return 'future';
  if (state === 'post' || /final|full time|ft|complete/.test(status)) return 'finished';
  if (!d) return matchHasScore(m) ? 'finished' : 'future';

  const liveWindowMs = 2.5 * 60 * 60 * 1000;

  if (now - d <= liveWindowMs) return 'live';

}
function isLiveMatch(m) { return matchTimeState(m) === 'live'; }
function scoreOrTimeLine(m, zone) {
  const p = partsInZone(m, zone);
  const state = matchTimeState(m);
  if (state === 'future' || !matchHasScore(m)) return `${flag(m.team1)} ${p.time} ${flag(m.team2)}`;
  return `${flag(m.team1)} ${m.score1} - ${m.score2} ${flag(m.team2)}`;
}
function firstRowWidthPx(first) {
  const imgCount = (first.match(/<img\b/gi) || []).length;
  const plain = first.replace(/<[^>]*>/g, '').trim();
  // Width is driven by the first row only. Flag images for Scotland/England need

  return Math.ceil(Math.max(76, Math.min(240, plain.length * 7.6 + imgCount * 24 + 22)));
}
function cardHtml(m, zone) {
  const p = partsInZone(m, zone);
  const first = scoreOrTimeLine(m, zone);
  const w = firstRowWidthPx(first);
  const isLive = matchTimeState(m) === 'live';
  const liveClass = isLive ? ' live' : '';
  const tomorrowClass = (!isLive && isTomorrowForCurrentRange(m, zone)) ? ' tomorrow' : '';
  const liveRow = isLive ? '<div class="live-row">(LIVE)</div>' : '';
  return `<div class="map-card${tomorrowClass}${liveClass}" style="width:${w}px">${liveRow}<div class="score-row">${first}</div><div class="time-row">${p.time} ${p.zone}</div><div class="date-row">${displayDateDMY(p.date)}</div><div class="venue-row" title="${m.real} (${m.city})">${m.real} (${m.city})</div></div>`;
}
function singleMatchIcon(m, zone) {
  const card = cardHtml(m, zone);
  const first = scoreOrTimeLine(m, zone);
  const w = firstRowWidthPx(first);
  const h = matchTimeState(m) === 'live' ? 88 : 78;
  const html = `<div class="venue-marker" style="width:${w}px;height:${h}px">${card}<div class="leader-line"></div><div class="anchor-dot"></div></div>`;
  return L.divIcon({ className:'', html, iconSize:[w,h], iconAnchor:[w/2,h] });
}
function matchPopup(m, zone) {
  const p = partsInZone(m, zone);
  const state = matchTimeState(m);
  const result = (state !== 'future' && matchHasScore(m)) ? `${m.score1} - ${m.score2}${state === 'live' ? ' · LIVE' : ''}` : `${p.time} ${p.zone}`;
  const statusLine = m.liveStatus ? `<div class="detail-meta">Status: ${m.liveStatus}</div>` : '';
  const code1 = codeForTeam(m.team1);
  const code2 = codeForTeam(m.team2);
  return `<div class="popup match-detail-popup">
    <div class="detail-title">${m.team1} vs ${m.team2}</div>
    <div class="detail-score-row">
      <div class="detail-side home">${flag(m.team1)} <span class="team-code">${code1}</span></div>
      <div class="detail-result">${result}</div>
      <div class="detail-side away"><span class="team-code">${code2}</span> ${flag(m.team2)}</div>
    </div>
    <div class="detail-row"><b>Match #${m.match}</b> · ${m.stage}</div>
    <div class="detail-row">${displayDateDMY(p.date)} · ${p.time} ${p.zone}</div>
    ${statusLine}
    <div class="detail-row"><b>${m.real}</b></div>
    <div class="detail-meta">${m.venue} · ${m.city}, ${m.country}</div>
    <div class="detail-meta"><a href="https://www.fifa.com/en/match-centre" target="_blank" rel="noopener">${t('openFifa')}</a></div>
  </div>`;
}
function markerIcon(n, isTomorrow=false) {
  const w = 34, h = 63;
  const cls = isTomorrow ? 'cluster-bubble tomorrow' : 'cluster-bubble';
  const html = `<div class="venue-marker" style="width:${w}px;height:${h}px"><div class="${cls}">${n}</div><div class="leader-line"></div><div class="anchor-dot"></div></div>`;
  return L.divIcon({ className:'', html, iconSize:[w,h], iconAnchor:[w/2,h] });
}

const liveScoreConfig = {
  endpoint: 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard',
  // This endpoint is public/undocumented. It may change or be blocked by CORS in some browsers.
  maxRangeDays: 45
};
const teamAliases = {
  'usa':['united states','usa','us','u.s.','united states of america'],
  'united states':['united states','usa','us','u.s.','united states of america'],
  'czech republic':['czech republic','czechia'],
  'czechia':['czech republic','czechia'],
  'turkiye':['turkiye','türkiye','turkey'],
  'türkiye':['turkiye','türkiye','turkey'],
  'turkey':['turkiye','türkiye','turkey'],
  'ivory coast':['ivory coast','cote divoire','côte divoire','côte d’ivoire','cote d ivoire'],
  'dr congo':['dr congo','d.r. congo','democratic republic of congo','congo dr','cod'],
  'cabo verde':['cabo verde','cape verde'],
  'cape verde':['cabo verde','cape verde'],
  'curacao':['curacao','curaçao'],
  'curaçao':['curacao','curaçao'],
  'south korea':['south korea','korea republic','korea republic of','kor'],
  'bosnia and herzegovina':['bosnia and herzegovina','bosnia-herzegovina','bosnia'],
  'south africa':['south africa','rsa'],
  'new zealand':['new zealand','nzl']
};
function normalizeName(value) {
  return String(value || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase()
    .replace(/&/g,' and ')
    .replace(/[^a-z0-9]+/g,' ')
    .trim();
}
function canonicalNames(team) {
  const normalized = normalizeName(team);
  const aliases = teamAliases[normalized] || [normalized];
  const code = normalizeName(codeForTeam(team));
  return new Set([normalized, code, ...aliases.map(normalizeName)].filter(Boolean));
}
function teamsMatch(a, b) {
  const aa = canonicalNames(a), bb = canonicalNames(b);
  for (const x of aa) if (bb.has(x)) return true;
  return false;
}
function dateCompact(iso) { return String(iso || '').replaceAll('-', ''); }
function dateFromEventInET(event) {
  if (!event?.date) return '';
  return new Intl.DateTimeFormat('en-CA', {timeZone:'America/New_York', year:'numeric', month:'2-digit', day:'2-digit'}).format(new Date(event.date));
}
function timeFromEventInET(event) {
  if (!event?.date) return '';
  return new Intl.DateTimeFormat('en-GB', {timeZone:'America/New_York', hour:'2-digit', minute:'2-digit', hour12:false}).format(new Date(event.date));
}
function applyLiveScheduleEvent(event, local) {
  if (!event?.date || !local) return false;
  const newDate = dateFromEventInET(event);
  const newTime = timeFromEventInET(event);
  let changed = false;
  if (newDate && local.date !== newDate) { local.date = newDate; changed = true; }
  if (newTime && local.kickoffTimeET !== newTime) { local.kickoffTimeET = newTime; changed = true; }
  local.sourceTimeZone = 'America/New_York';
  const state = event?.status?.type?.state || '';
  const detail = event?.status?.type?.shortDetail || event?.status?.type?.description || event?.status?.type?.detail || '';
  if (state || detail) {
    local.statusState = state;
    local.liveStatus = detail || state;
    changed = true;
  }
  return changed;
}
function refreshDateRangeForCurrentView() {
  const current = filtered();
  const dates = unique(current.map(m => m.date));
  if (!dates.length) return null;
  const first = dates[0], last = dates[dates.length - 1];
  const days = Math.round((new Date(last + 'T00:00:00Z') - new Date(first + 'T00:00:00Z')) / 86400000) + 1;
  if (days > liveScoreConfig.maxRangeDays) return {first:first, last:last};
  return {first, last};
}
function findLocalMatchForEvent(event) {
  const comp = event?.competitions?.[0];
  const competitors = comp?.competitors || [];
  if (competitors.length < 2) return null;
  const names = competitors.map(c => c?.team?.displayName || c?.team?.shortDisplayName || c?.team?.name || c?.team?.abbreviation || '');
  const eventDate = dateFromEventInET(event);
  return matches.find(m => {
    const sameDate = !eventDate || m.date === eventDate;
    const sameTeams = (teamsMatch(m.team1, names[0]) && teamsMatch(m.team2, names[1])) || (teamsMatch(m.team1, names[1]) && teamsMatch(m.team2, names[0]));
    return sameDate && sameTeams;
  }) || matches.find(m => {
    const sameTeams = (teamsMatch(m.team1, names[0]) && teamsMatch(m.team2, names[1])) || (teamsMatch(m.team1, names[1]) && teamsMatch(m.team2, names[0]));
    return sameTeams;
  });
}
function applyLiveEvent(event) {
  const comp = event?.competitions?.[0];
  const competitors = comp?.competitors || [];
  const local = findLocalMatchForEvent(event);
  if (!local) return false;
  let changed = applyLiveScheduleEvent(event, local);
  if (competitors.length >= 2) {
    let c1 = competitors.find(c => teamsMatch(local.team1, c?.team?.displayName || c?.team?.shortDisplayName || c?.team?.name || c?.team?.abbreviation));
    let c2 = competitors.find(c => teamsMatch(local.team2, c?.team?.displayName || c?.team?.shortDisplayName || c?.team?.name || c?.team?.abbreviation));
    if (c1 && c2) {
      const s1 = Number.parseInt(c1.score, 10), s2 = Number.parseInt(c2.score, 10);
      if (Number.isFinite(s1) && Number.isFinite(s2)) {
        if (local.score1 !== s1 || local.score2 !== s2) changed = true;
        local.score1 = s1; local.score2 = s2;
      }
    }

async function refreshLiveScores() {
  const range = refreshDateRangeForCurrentView();
  if (!range) return {ok:false, updated:0, message:'No visible matches to refresh.'};
  const dates = range.first === range.last ? dateCompact(range.first) : `${dateCompact(range.first)}-${dateCompact(range.last)}`;
  const url = `${liveScoreConfig.endpoint}?limit=200&dates=${dates}`;
  const res = await fetch(url, {cache:'no-store'});
  if (!res.ok) throw new Error(`Live score request failed (${res.status})`);
  const payload = await res.json();
  let updated = 0;
  (payload.events || []).forEach(event => { if (applyLiveEvent(event)) updated++; });
  return {ok:true, updated, message:`Schedule and scores refreshed. ${updated} match(es) updated from live source.`};
}
function setRefreshLabel(text) { $('refresh').innerHTML = `${refreshIconSvg}<span>${text || t('refresh')}</span>`; }
function filtered() {
  const zone=$('timezone').value, q=$('search').value.trim().toLowerCase(), date=$('date').value, team=$('team').value, st=$('stage').value, ve=$('venue').value, host=$('hostCountry').value;
  const tomorrow = date ? addIsoDays(date, 1) : '';
  return matches.filter(m => {
    const p = partsInZone(m, zone);
    const dateOk = !date || (rangeMode === 'todayTomorrow' ? (p.date === date || p.date === tomorrow) : p.date === date);
    return dateOk && (!team||m.team1===team||m.team2===team) && (!st||m.stage===st) && (!ve||m.venue===ve) && (!host||m.country===host) && (!q || [m.team1,m.team2,m.venue,m.city,m.country,m.stage,m.real].join(' ').toLowerCase().includes(q));
  });
}
function render() {
  const zone=$('timezone').value;
  const data = filtered();
  $('count').textContent = data.length;
  if ($('totalMatchesCount')) $('totalMatchesCount').textContent = matches.length;
  const byVenue = new Map();
  data.forEach(m => { if(!byVenue.has(m.venue)) byVenue.set(m.venue, []); byVenue.get(m.venue).push(m); });
  $('venuesCount').textContent = byVenue.size;
  if ($('totalVenuesCount')) $('totalVenuesCount').textContent = Object.keys(venues).length;
  markers.forEach(marker => map.removeLayer(marker)); markers.clear();
  byVenue.forEach((items, venue) => {
    const v = venues[venue];
    let marker;
    if (items.length === 1) {
      marker = L.marker([v.lat, v.lng], {icon: singleMatchIcon(items[0], zone), riseOnHover:true})
        .addTo(map)
        .bindPopup(matchPopup(items[0], zone));
    }
    else {
      const popup = `<div class="popup"><h3>${venue}</h3><p><b>${v.real}</b></p><p class="mini">${v.city}, ${v.country}</p><p>${items.length} ${t('filteredMatches')}</p><hr>${items.slice(0,12).map(m=>{ const p=partsInZone(m,zone); const state=matchTimeState(m); const status=state==='live'?' · LIVE':(state==='finished'?' · FT':''); return `<p class="mini match-popup-row"><b>#${m.match}</b> ${scoreOrTimeLine(m, zone)} · ${displayDateDMY(p.date)} ${p.time} ${p.zone}${status}</p>`; }).join('')}${items.length>12?'<p class="mini">…</p>':''}<p class="mini"><a href="https://www.fifa.com/en/match-centre" target="_blank" rel="noopener">${t('openFifa')}</a></p></div>`;
      marker = L.marker([v.lat, v.lng], {icon: markerIcon(items.length, rangeMode === 'todayTomorrow' && items.every(m => isTomorrowForCurrentRange(m, zone))), riseOnHover:true}).addTo(map).bindPopup(popup);
    }
    markers.set(venue, marker);
  });
  const list = $('list'); list.innerHTML='';
  [...data].sort((a,b)=>a.match-b.match).forEach(m => {
    const p=partsInZone(m, zone);
    const div=document.createElement('div'); div.className='match' + (activeMatch===m.match?' active':'');
    div.innerHTML=`<div class="top"><span class="badge">#${m.match}</span><span>${displayDateDMY(p.date)} · ${p.time} ${p.zone}</span></div><div class="teams">${m.team1} vs ${m.team2}</div><div class="venue">${m.real} (${m.city})</div>`;
    div.onclick=()=>{ activeMatch=m.match; map.setView([m.lat,m.lng], 10); markers.get(m.venue)?.openPopup?.(); render(); };
    list.appendChild(div);
  });
  if(byVenue.size) { const group=[...byVenue.keys()].map(v=>[venues[v].lat, venues[v].lng]); map.fitBounds(group, {padding:[35,35], maxZoom:5}); }
}
restoreState();
function selectTodayAndSave() { $('date').value = todayInZone($('timezone').value); setRangeMode('single', false); saveState(); }
function selectTodayTomorrowAndSave() { $('date').value = todayInZone($('timezone').value); setRangeMode('todayTomorrow', false); saveState(); }
async function autoRefreshOnLoad() {
  setRefreshLabel(t('updating'));
  $('refresh').disabled = true;
  try { await refreshLiveScores(); }
  catch (err) { console.warn('Initial live refresh failed:', err); }
  finally { $('refresh').disabled = false; setRefreshLabel(t('refresh')); render(); }
}
let liveAutoRefreshTimer = null;
async function runSilentLiveRefresh() {
  if (!matches.some(m => matchTimeState(m) === 'live')) return;
  try {
    await refreshLiveScores();
    render();
  } catch (err) {
    console.warn('Automatic live refresh failed:', err);
  }
}
function startLiveAutoRefresh() {
  if (liveAutoRefreshTimer) clearInterval(liveAutoRefreshTimer);
  liveAutoRefreshTimer = setInterval(runSilentLiveRefresh, 60000);
}
selectTodayTomorrowAndSave();
stateKeys.forEach(id=>$(id).addEventListener('input', () => { if (id==='date') setRangeMode('single', false); saveState(); render(); }));
$('today').onclick=()=>{ selectTodayAndSave(); render(); };
$('todayTomorrow').onclick=()=>{ selectTodayTomorrowAndSave(); render(); };
$('clearSearch').onclick=()=>{ $('search').value=''; saveState(); render(); };
$('clearDate').onclick=()=>{ $('date').value=''; setRangeMode('single', false); saveState(); render(); };
$('refresh').onclick=async()=>{
  saveState();
  setRefreshLabel(t('updating'));
  $('refresh').disabled = true;
  try {
    await refreshLiveScores();
  } catch (err) {

$('reset').onclick=()=>{ ['search','date','team','stage','venue','hostCountry'].forEach(id=>$(id).value=''); $('timezone').value='Europe/Berlin'; setRangeMode('single', false); activeMatch=null; saveState(); render(); };
render();
autoRefreshOnLoad().then(startLiveAutoRefresh);
</script>
